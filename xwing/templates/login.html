<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — X-wing</title>
  <style nonce="{{ csrf_nonce }}">
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('/static/fonts/JetBrainsMono-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #020617;
      color: #f1f5f9;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / .6);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.625rem;
      margin-bottom: 2rem;
    }

    .logo-text {
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: -0.025em;
    }

    /* ── Error ── */
    .error {
      background: #1c0505;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.7rem 0.875rem;
      font-size: 0.8125rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .error-icon { flex-shrink: 0; margin-top: 1px; }

    /* ── Fields ── */
    .field { margin-bottom: 1.125rem; }

    label {
      display: block;
      font-size: 0.6875rem;
      font-weight: 500;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      color: #f1f5f9;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.875rem;
      padding: 0.625rem 0.75rem;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder { color: #475569; }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgb(59 130 246 / .2);
    }

    /* ── Submit ── */
    .submit-wrap { margin-top: 1.5rem; }

    button[type="submit"] {
      width: 100%;
      background: #7c3aed;
      color: #ffffff;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    button[type="submit"]:hover:not(:disabled) { background: #6d28d9; }
    button[type="submit"]:active:not(:disabled) { transform: scale(0.99); }

    button[type="submit"]:focus-visible {
      outline: 2px solid #7c3aed;
      outline-offset: 2px;
    }

    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 15px;
      height: 15px;
      border: 2px solid rgb(255 255 255 / .25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    button[type="submit"].loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .powered-by {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.72rem;
      color: #475569;
    }
    .powered-by a {
      color: #64748b;
      text-decoration: none;
    }
    .powered-by a:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="36" height="36" style="flex-shrink:0">
        <rect x="6" y="6" width="188" height="188" rx="36" fill="#f5f3ff"/>
        <polygon points="71,78 23,48 15,100 23,152 71,122"
                 fill="none" stroke="#7c3aed" stroke-width="3" stroke-linejoin="round"/>
        <polyline points="71,78 30,100 71,122"
                  fill="none" stroke="#8b5cf6" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
        <polygon points="129,78 177,48 185,100 177,152 129,122"
                 fill="none" stroke="#7c3aed" stroke-width="3" stroke-linejoin="round"/>
        <polyline points="129,78 170,100 129,122"
                  fill="none" stroke="#8b5cf6" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="71" y1="78"  x2="86" y2="86"  stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="71" y1="122" x2="86" y2="114" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="129" y1="78"  x2="114" y2="86"  stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="129" y1="122" x2="114" y2="114" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="100" cy="100" r="20" fill="none" stroke="#7c3aed" stroke-width="3.5"/>
        <circle cx="100" cy="100" r="13" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
        <circle cx="100" cy="100" r="4.5" fill="#a78bfa"/>
      </svg>
      <span class="logo-text">X-wing</span>
    </div>

    {% if error %}
    <div class="error">
      <svg class="error-icon" width="14" height="14" viewBox="0 0 15 15" fill="none">
        <path d="M7.5 1a6.5 6.5 0 1 0 0 13A6.5 6.5 0 0 0 7.5 1ZM7 4.5a.5.5 0 0 1 1 0v4a.5.5 0 0 1-1 0v-4Zm.5 6.5a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" fill="currentColor"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ login_path }}" id="login-form">
      {% if redirect %}<input type="hidden" name="redirect" value="{{ redirect }}">{% endif %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>

      <div class="submit-wrap">
        <button type="submit" id="submit-btn">
          <span class="spinner"></span>
          Sign in
        </button>
      </div>
    </form>

    <div class="powered-by">Powered by <a href="https://github.com/anudeepd/ldapgate" tabindex="-1">LDAPGate</a></div>
  </div>

  <script nonce="{{ csrf_nonce }}">
    document.getElementById('login-form').addEventListener('submit', function() {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.classList.add('loading');
    });
  </script>
</body>
</html>
