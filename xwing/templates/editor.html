<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ filename }} — X-wing</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link rel="stylesheet" href="/static/assets/style.css"/>
</head>
<body data-file-path="{{ file_url_path }}"
      data-file-ext="{{ ext }}"
      data-can-write="{{ 'true' if perms.write else 'false' }}"
      data-csp-style-nonce="{{ csp_style_nonce or '' }}">
<div class="editor-shell">
  <div class="editor-toolbar">
    <a class="btn" href="{{ dir_url_path }}">← back</a>
    <span class="filename">{{ filename }}</span>
    <span class="filepath">{{ file_path }}</span>
    <span class="save-status" id="save-status"></span>
    <a class="btn" href="{{ file_url_path }}" download title="Download raw file">download</a>
    <button class="btn btn-primary" id="save-btn" {% if not perms.write %}disabled title="Read-only access"{% endif %}>Save</button>
  </div>
  {% if not perms.write %}
  <div class="readonly-notice editor-readonly" role="status">
    Read-only access. Saving changes is disabled.
  </div>
  {% endif %}
  <div class="editor-wrap" id="editor-wrap"></div>
</div>

<textarea id="editor-content" hidden>{{ content }}</textarea>
<script src="/static/codemirror-bundle.js"></script>
<script src="/static/assets/editor.js"></script>
</body>
</html>
