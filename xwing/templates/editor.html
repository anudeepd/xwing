<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#080b12"/>
  <title>{{ filename }} — X-wing</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
  <link rel="stylesheet" href="/static/assets/style.css"/>
</head>
<body data-file-path="{{ file_url_path }}" data-file-ext="{{ ext }}" data-can-write="{{ 'true' if perms.write else 'false' }}" data-auth-idle-timeout="{{ auth_idle_timeout }}" data-csp-style-nonce="{{ csp_style_nonce or '' }}">
  <div id="xwing-editor-root"><div class="boot-loading" role="status">Opening editor…</div></div>
  <script type="application/json" id="xwing-editor-bootstrap">{{ editor_bootstrap | tojson }}</script>
  <script src="/static/codemirror-bundle.js"></script>
  <script src="/static/assets/editor.js" defer></script>
</body>
</html>
