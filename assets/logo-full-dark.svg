<svg viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon background -->
  <rect x="4" y="4" width="112" height="112" rx="22" fill="#f5f3ff"/>

  <!-- Left swept wing panel -->
  <polygon points="44,48 17,31 12,60 17,89 44,73"
           fill="none" stroke="#7c3aed" stroke-width="1.7" stroke-linejoin="round"/>
  <!-- Left wing crease -->
  <polyline points="44,48 21,60 44,73"
            fill="none" stroke="#8b5cf6" stroke-width="0.9"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right swept wing panel -->
  <polygon points="76,48 103,31 108,60 103,89 76,73"
           fill="none" stroke="#7c3aed" stroke-width="1.7" stroke-linejoin="round"/>
  <!-- Right wing crease -->
  <polyline points="76,48 99,60 76,73"
            fill="none" stroke="#8b5cf6" stroke-width="0.9"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left pylons -->
  <line x1="44" y1="48" x2="52" y2="52" stroke="#7c3aed" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="44" y1="73" x2="52" y2="68" stroke="#7c3aed" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Right pylons -->
  <line x1="76" y1="48" x2="68" y2="52" stroke="#7c3aed" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="76" y1="73" x2="68" y2="68" stroke="#7c3aed" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Cockpit hull -->
  <circle cx="60" cy="60" r="11" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <!-- Cockpit viewport ring -->
  <circle cx="60" cy="60" r="7"  fill="none" stroke="#8b5cf6" stroke-width="1.4"/>
  <!-- Cockpit center -->
  <circle cx="60" cy="60" r="2.5" fill="#a78bfa"/>

  <!-- Wordmark (dark — for light backgrounds) -->
  <text x="136" y="74"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="52" font-weight="600" letter-spacing="-1"
        fill="#3b0764">Nostromo</text>
</svg>
